<!doctype html>
<html lang="et">

<head>
  <meta charset="utf-8" />
  <title>Väljumised</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #081b1f;
      --muted: #6b8b80;
      --accent: #0e794b;
      --header-footer-bg: #f6f8f7; /* sama taust headerile ja footerile */
      --footer-text: #446559;
    }

    html,
    body {
      margin: 0;
      background: var(--bg);
      font-family: Mulish, Arial, sans-serif;
      color: var(--text);
      font-size: 5vh;
      min-height: 100vh;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Layout: header, content, footer */
    .header {
      background: var(--header-footer-bg);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 32px;
      box-sizing: border-box;
    }

    .clock {
      font-size: 10vh;
      font-weight: 800;
    }

    .stop-name {
      font-weight: 600;
      font-size: 8vh;
    }

    .content {
      /* takes all space between header and footer */
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      padding: 4px 20px;
      box-sizing: border-box;
      min-height: 0; /* important for children flex overflow */
    }

    .tables-row {
      display: flex;
      gap: 12px;
      flex: 1 1 0;
      align-items: stretch;
      min-height: 0; /* allow children to shrink and scroll */
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .table-wrap {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .table-container {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      padding: 8px;
      min-height: 0;
    }

    /* Make table stretch to available height; allow tbody to scroll */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    thead {
      background: var(--accent);
      flex: 0 0 auto;
    }

    tbody {
      display: block;
      overflow: auto;
      flex: 1 1 auto;
      /* keep rows compact */
    }

    thead tr, tbody tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    th {
      font-weight: 600;
      text-align: left;
      padding: 8px 12px;
      color: white;
    }

    td {
      font-weight: 700;
      padding: 12px;
      border-top: 1px solid #ecf4f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr:nth-child(even) {
      background: #f1fbf6;
    }

    .minutes {
      text-align: left;
      width: 1%;
    }

    .line-box {
      display: inline-block;
      background: var(--accent);
      color: #ffffff;
      padding: 0px 20px;
      border-radius: 10px;
      font-weight: 800;
    }

    #line-col {
      width: 1%;
      white-space: nowrap;
    }

    /* footer (not fixed) - same background as header, no border line */
    footer {
      background: var(--header-footer-bg);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-sizing: border-box;
      /* no border-top */
    }

    footer img {
      height: 40px;
      width: auto;
      display: block;
    }

    .footer-text {
      color: var(--footer-text);
      font-size: 2.4vh; /* larger in vh */
      line-height: 1;
    }

    @media (max-width: 800px) {
      .tables-row {
        flex-direction: column;
      }

      .clock {
        font-size: 6vh;
      }

      .stop-name {
        font-size: 3.5vh;
      }

      .footer-text {
        font-size: 2.2vh;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

<body>
  <header class="header">
    <div id="clock" class="clock">--:--</div>
    <div class="stop-name">Kolde puiestee</div>
  </header>

  <main class="content">
    <div class="tables-row">
      <div class="table-wrap" id="left-wrap">
        <div class="table-container">
          <table id="departuresLeft" aria-label="Väljumised - vasak">
            <thead>
              <tr>
                <th id="line-col">Liin</th>
                <th>Siht</th>
                <th>Väljub</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="table-wrap" id="right-wrap">
        <div class="table-container">
          <table id="departuresRight" aria-label="Väljumised - parem">
            <thead>
              <tr>
                <th id="line-col">Liin</th>
                <th>Siht</th>
                <th>Väljub</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- footer: not fixed, same bg as header, no border line -->
  <footer>
    <img src="logo.svg" alt="Logo">
    <div class="footer-text">Hoiatus: andmed ei pruugi olla täpsed — ei arvesta busside hilinemistega.</div>
  </footer>

  <script>
    // === CONFIG ===
    const DEFAULT_ZIP = 'https://perg-transport.vercel.app/api/tallinn';
    const LEFT_STOP_IDS = ["1194"];
    const RIGHT_STOP_IDS = ["1203", "1210"];
    const MAX_DISPLAY = 8;
    const REDOWNLOAD_INTERVAL_MS = 5 * 60 * 1000;

    // === STATE ===
    let INDEXES = null;
    let lastDownloadedAt = 0;

    // === CLOCK ===
    function updateClock() {
      const n = new Date();
      const hh = String(n.getHours()).padStart(2, '0');
      const mm = String(n.getMinutes()).padStart(2, '0');
      const ss = String(n.getSeconds()).padStart(2, '0');
      document.getElementById("clock").textContent = hh + ":" + mm + ":" + ss;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // === CSV parse helper ===
    function parseCSV(text) {
      return Papa.parse(text.trim(), { header: true, skipEmptyLines: true }).data;
    }

    // === GTFS time to Date ===
    function parseGtfsTimeToDate(timeStr, refDate) {
      if (!timeStr) return null;
      const parts = timeStr.split(":").map(Number);
      if (parts.length < 2) return null;
      let [h, m, s] = [parts[0] || 0, parts[1] || 0, parts[2] || 0];
      const d = new Date(refDate);
      d.setHours(0, 0, 0, 0);
      const addDays = Math.floor(h / 24);
      h = h % 24;
      d.setDate(d.getDate() + addDays);
      d.setHours(h, m, s, 0);
      return d;
    }

    // === Load GTFS and index relevant files ===
    async function loadGTFS(force = false) {
      const now = Date.now();
      if (!force && INDEXES && now - lastDownloadedAt < REDOWNLOAD_INTERVAL_MS) {
        return INDEXES;
      }

      // fetch expects a ZIP; the provided endpoint should return a GTFS zip.
      const res = await fetch(DEFAULT_ZIP);
      if (!res.ok) throw new Error('ZIP fetch failed: ' + res.status);
      const ab = await res.arrayBuffer();
      const zip = await JSZip.loadAsync(ab);

      const stops = zip.file("stops.txt") ? parseCSV(await zip.file("stops.txt").async("string")) : [];
      const stop_times = zip.file("stop_times.txt") ? parseCSV(await zip.file("stop_times.txt").async("string")) : [];
      const trips = zip.file("trips.txt") ? parseCSV(await zip.file("trips.txt").async("string")) : [];
      const routes = zip.file("routes.txt") ? parseCSV(await zip.file("routes.txt").async("string")) : [];
      const calendar = zip.file("calendar.txt") ? parseCSV(await zip.file("calendar.txt").async("string")) : [];
      const calendar_dates = zip.file("calendar_dates.txt") ? parseCSV(await zip.file("calendar_dates.txt").async("string")) : [];

      const stopById = new Map(stops.map(s => [s.stop_id, s]));
      const tripById = new Map(trips.map(t => [t.trip_id, t]));
      const routeById = new Map(routes.map(r => [r.route_id, r]));

      const stopTimesByStop = new Map();
      for (const st of stop_times) {
        const sid = st.stop_id;
        if (!stopTimesByStop.has(sid)) stopTimesByStop.set(sid, []);
        stopTimesByStop.get(sid).push(st);
      }

      // calendar indexes
      const calendarByService = new Map();
      for (const c of calendar) {
        if (c.service_id) calendarByService.set(c.service_id, c);
      }

      const calendarDatesByService = new Map();
      for (const cd of calendar_dates) {
        if (!calendarDatesByService.has(cd.service_id)) calendarDatesByService.set(cd.service_id, []);
        calendarDatesByService.get(cd.service_id).push(cd);
      }

      INDEXES = { stops, stopById, tripById, routeById, stopTimesByStop, calendarByService, calendarDatesByService };
      lastDownloadedAt = now;
      return INDEXES;
    }

    // === calendar helpers ===
    function YYYYMMDD(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}${m}${dd}`;
    }

    function isServiceActive(service_id, dateObj) {
      if (!INDEXES) return true;
      if (!service_id) return true;
      const dateStr = YYYYMMDD(dateObj);

      // calendar_dates overrides
      const cds = INDEXES.calendarDatesByService.get(service_id) || [];
      for (const cd of cds) {
        if (cd.date === dateStr) {
          return String(cd.exception_type) === '1';
        }
      }

      const cal = INDEXES.calendarByService.get(service_id);
      if (!cal) return true; // permissive fallback

      const start = cal.start_date;
      const end = cal.end_date;
      if (dateStr < start || dateStr > end) return false;

      const weekday = dateObj.getDay();
      const weekdayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      const field = weekdayMap[weekday];
      return String(cal[field]) === '1';
    }

    // escape HTML
    function escapeHtml(s = '') { return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;'); }

    // === compute upcoming departures ===
    function computeUpcomingForStops(stopIds, maxCount = MAX_DISPLAY) {
      if (!INDEXES) return [];
      const now = new Date();
      const candidates = [];

      for (const sid of stopIds) {
        const rows = INDEXES.stopTimesByStop.get(sid) || [];
        for (const r of rows) {
          const dt = parseGtfsTimeToDate(r.departure_time || r.arrival_time, now);
          if (!dt) continue;
          const diff = dt - now;

          // discard departures that are at or before now
          if (diff <= 0) continue;

          // ignore absurdly far future
          if (diff > 7 * 24 * 3600 * 1000) continue;

          const trip = INDEXES.tripById.get(r.trip_id) || {};
          const serviceId = trip.service_id;
          if (serviceId && !isServiceActive(serviceId, dt)) continue;

          const route = INDEXES.routeById.get(trip.route_id) || {};
          candidates.push({
            dt,
            route: route.route_short_name || route.route_id || '',
            headsign: trip.trip_headsign || trip.trip_short_name || '',
            stop_id: sid
          });
        }
      }

      candidates.sort((a, b) => a.dt - b.dt);

      const unique = [];
      const seen = new Set();
      for (const c of candidates) {
        const minuteKey = Math.floor(c.dt.getTime() / 60000);
        const key = `${minuteKey}|${c.route}|${c.headsign}`;
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(c);
        if (unique.length >= maxCount) break;
      }
      return unique;
    }

    // === render table ===
    function renderTable(tableId, entries) {
      const tbody = document.querySelector(`#${tableId} tbody`);
      tbody.innerHTML = '';
      const now = new Date();
      for (const u of entries) {
        // STANDARD minutes (no shifting)
        const rawMinutes = (u.dt - now) / 60000;
        const mins = Math.max(0, Math.round(rawMinutes));
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="line-box">${escapeHtml(u.route)}</span></td>
          <td>${escapeHtml(u.headsign)}</td>
          <td>${escapeHtml(u.dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }))}</td>
          <td class="minutes">${mins} min</td>
        `;
        tbody.appendChild(tr);
      }
    }

    // === refresh ===
    async function refresh(force = false) {
      try {
        await loadGTFS(force);
        const leftEntries = computeUpcomingForStops(LEFT_STOP_IDS, MAX_DISPLAY);
        renderTable('departuresLeft', leftEntries);
        const rightEntries = computeUpcomingForStops(RIGHT_STOP_IDS, MAX_DISPLAY);
        renderTable('departuresRight', rightEntries);
      } catch (err) {
        console.error('refresh error', err);
      }
    }

    // schedule refresh at minute boundary
    function scheduleNextMinuteRefresh() {
      const now = new Date();
      const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
      setTimeout(() => {
        refresh(false);
        scheduleNextMinuteRefresh();
      }, msUntilNextMinute);
    }

    // start
    refresh(true);
    scheduleNextMinuteRefresh();
    setInterval(() => refresh(true), REDOWNLOAD_INTERVAL_MS);
  </script>
</body>

</html>
