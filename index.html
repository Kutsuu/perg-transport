<!doctype html>
<html lang="et">

<head>
    <meta charset="utf-8">
    <title>Väljumised</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #081b1f;
            --muted: #ecf4f0;
            --accent: #0e794b;
        }

        html,
        body {
            justify-content: center;
            margin: 0;
            background: var(--bg);
            font-family: Mulish, Arial, sans-serif;
            color: var(--text);
            font-size: 5vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Layout */
        .wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 0;
            /* eemaldame siit */
        }

        .content-padding {
            padding: 4px 20px 4px 20px;
             /* paneme paddingu wrapperi sees olevatele elementidele, mitte wrapperile endale, et headeril ja tabelitel oleks ühtlane horisontaalne padding */
        }

        /* Header row: clock + stop name */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            /* vasakule */
            gap: 32px;
            /* natuke suurem vahe */
            margin-bottom: 0;
        }

        /* Large centered clock */
        .clock {
            font-size: 10vh;
            font-weight: 800;
        }

        .stop-name {
            font-weight: 600;
            font-size: 8vh;
            /* SUUREM */
            align-self: center;
        }

        /* Two tables side-by-side */
        .tables-row {
            display: flex;
            gap: 12px;
            flex: 1;
            align-items: stretch;
        }

        .table-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            /* allow shrink */
        }

        .table-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        table {
            width: 100%;
            height: fit-content;
            border-collapse: collapse;
            table-layout: auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 10px 5px rgba(0, 0, 0, 0.2);
            background: var(--panel);
        }

        thead {
            background: #0e794b;
        }

        th {
            font-weight: 600;
            text-align: left;
            padding: 6px 12px 6px 12px;
            color: var(--muted);
        }

        td {
            font-weight: 700;
            padding: 12px;
            border-top: 1px solid #ecf4f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tbody tr {
            height: 9%;
        }

        tbody tr:nth-child(even) {
            background: #e3efea;
        }

        .line {
            color: var(--accent);
            font-weight: 800;
        }

        .minutes {
            text-align: left;
            width: fit-content;
        }

        /* Highlight box for the route number (ONLY visual change) */
        .line-box {
            display: inline-block;
            background: var(--accent);
            color: #ffffff;
            padding: 0px 24px;
            border-radius: 12px;
            font-weight: 800;
        }

        #line-col {
            width: 1%;
            white-space: nowrap;
        }

        /* Blink animation for entire row */
        @keyframes blinkZero {
            0% {
                opacity: 1;
            }

            66% {
                opacity: 1;
            }

            /* 1 sekund nähtav (≈66% of 1.5s) */
            67% {
                opacity: 0;
            }

            /* 0.5 sekundit kadunud */
            100% {
                opacity: 0;
            }
        }

        .blink-zero {
            animation: blinkZero 1.5s infinite;
        }

        /* Responsive fallback: stack vertically on very narrow screens */
        @media (max-width:800px) {
            .tables-row {
                flex-direction: column;
            }

            .clock {
                font-size: 6vh;
            }

            .stop-name {
                font-size: 3.5vh;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

<body>

    <div class="wrapper">
        <div class="header-row content-padding">
            <div id="clock" class="clock">--:--</div>
            <div class="stop-name">Kolde puiestee</div>
        </div>

        <div class="tables-row content-padding">
            <!-- Left table: only stop_id = 1194 -->
            <div class="table-wrap" id="left-wrap">
                <div class="table-container">
                    <table id="departuresLeft">
                        <thead>
                            <tr>
                                <th id="line-col">Liin</th>
                                <th></th>
                                <th>Väljub</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Right table: stops 1203 + 1210 -->
            <div class="table-wrap" id="right-wrap">
                <div class="table-container">
                    <table id="departuresRight">
                        <thead>
                            <tr>
                                <th id="line-col">Liin</th>
                                <th></th>
                                <th>Väljub</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_ZIP = 'https://perg-transport.vercel.app/api/tallinn';
        const LEFT_STOP_IDS = ["1194"];
        const RIGHT_STOP_IDS = ["1203", "1210"];

        const MAX_DISPLAY = 8;
        const REDOWNLOAD_INTERVAL_MS = 5 * 60 * 1000;

        let INDEXES = null;
        let lastDownloadedAt = 0;

        function updateClock() {
            const n = new Date();
            const hh = String(n.getHours()).padStart(2, '0');
            const mm = String(n.getMinutes()).padStart(2, '0');
            const ss = String(n.getSeconds()).padStart(2, '0');
            document.getElementById("clock").textContent = hh + ":" + mm + ":" + ss;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function parseCSV(text) { return Papa.parse(text.trim(), { header: true, skipEmptyLines: true }).data; }

        function parseGtfsTimeToDate(timeStr, ref) {
            if (!timeStr) return null;
            let [h, m, s] = timeStr.split(":").map(Number);
            const d = new Date(ref);
            d.setHours(0, 0, 0, 0);
            const addDays = Math.floor(h / 24);
            h = h % 24;
            d.setDate(d.getDate() + addDays);
            d.setHours(h, m, s, 0);
            return d;
        }

        async function loadGTFS(force = false) {
            const now = Date.now();
            if (!force && INDEXES && now - lastDownloadedAt < REDOWNLOAD_INTERVAL_MS) {
                return INDEXES;
            }
            const res = await fetch(DEFAULT_ZIP);
            if (!res.ok) throw new Error('ZIP fetch failed: ' + res.status);
            const ab = await res.arrayBuffer();
            const zip = await JSZip.loadAsync(ab);
            const stops = parseCSV(await zip.file("stops.txt").async("string"));
            const stop_times = parseCSV(await zip.file("stop_times.txt").async("string"));
            const trips = parseCSV(await zip.file("trips.txt").async("string"));
            const routes = parseCSV(await zip.file("routes.txt").async("string"));

            const stopById = new Map(stops.map(s => [s.stop_id, s]));
            const tripById = new Map(trips.map(t => [t.trip_id, t]));
            const routeById = new Map(routes.map(r => [r.route_id, r]));
            const stopTimesByStop = new Map();
            for (const st of stop_times) {
                const sid = st.stop_id;
                if (!stopTimesByStop.has(sid)) stopTimesByStop.set(sid, []);
                stopTimesByStop.get(sid).push(st);
            }

            INDEXES = { stops, stopById, tripById, routeById, stopTimesByStop };
            lastDownloadedAt = now;
            return INDEXES;
        }

        function computeUpcomingForStops(stopIds, maxCount = MAX_DISPLAY) {
            if (!INDEXES) return [];
            const now = new Date();
            const candidates = [];

            for (const sid of stopIds) {
                const rows = INDEXES.stopTimesByStop.get(sid) || [];
                for (const r of rows) {
                    const dt = parseGtfsTimeToDate(r.departure_time || r.arrival_time, now);
                    if (!dt) continue;
                    const diff = dt - now;
                    if (diff < -30 * 1000) continue;
                    if (diff > 7 * 24 * 3600 * 1000) continue;
                    const trip = INDEXES.tripById.get(r.trip_id) || {};
                    const route = INDEXES.routeById.get(trip.route_id) || {};
                    candidates.push({
                        dt,
                        route: route.route_short_name || route.route_id || '',
                        headsign: trip.trip_headsign || trip.trip_short_name || '',
                        stop_id: sid
                    });
                }
            }

            candidates.sort((a, b) => a.dt - b.dt);

            const unique = [];
            const seen = new Set();
            for (const c of candidates) {
                const minuteKey = Math.floor(c.dt.getTime() / 60000);
                const key = `${minuteKey}|${c.route}|${c.headsign}`;
                if (seen.has(key)) continue;
                seen.add(key);
                unique.push(c);
                if (unique.length >= maxCount) break;
            }
            return unique;
        }

        function escapeHtml(s = '') { return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;'); }

        function renderTable(tableId, entries) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            const now = new Date();
            for (const u of entries) {
                const mins = Math.max(0, Math.round((u.dt - now) / 60000));
                const tr = document.createElement('tr');
                if (mins === 0) tr.classList.add('blink-zero');
                tr.innerHTML = `
      <td><span class="line-box">${escapeHtml(u.route)}</span></td>
      <td>${escapeHtml(u.headsign)}</td>
      <td>${escapeHtml(u.dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }))}</td>
      <td class="minutes">${mins} min</td>
    `;
                tbody.appendChild(tr);
            }
        }

        async function refresh(force = false) {
            try {
                await loadGTFS(force);
                const leftEntries = computeUpcomingForStops(LEFT_STOP_IDS, MAX_DISPLAY);
                renderTable('departuresLeft', leftEntries);
                const rightEntries = computeUpcomingForStops(RIGHT_STOP_IDS, MAX_DISPLAY);
                renderTable('departuresRight', rightEntries);
            } catch (err) {
                console.error(err);
            }
        }

        // schedule refresh exactly at each new minute start
        function scheduleNextMinuteRefresh() {
            const now = new Date();
            const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            setTimeout(() => {
                refresh(false);
                scheduleNextMinuteRefresh();
            }, msUntilNextMinute);
        }

        // Start
        refresh(true);
        scheduleNextMinuteRefresh();
        // keep periodic re-download of ZIP (5 min) for freshness
        setInterval(() => refresh(true), REDOWNLOAD_INTERVAL_MS);
    </script>
</body>


</html>
